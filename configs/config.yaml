# Datasets
data:
  root: ./data/medmnist
  image_size: 224
  num_workers: 4
  primary_dataset: pathmnist
  in_dist_classes: [0, 2, 3, 4, 5]      # adipose, debris, lymphocytes, mucus, smooth muscle
  near_ood_classes: [6, 7, 8]           # normal colon mucosa, cancer-associated stroma, adenocarcinoma
  excluded_classes: [1]                 # background
  far_ood: pneumoniamnist


# Pretrained models
models:
  vit: vit_base_patch16_224
  cnn: resnet50


# Training and extraction
training:
  batch_size: 64
  seed: 1410
  device: cuda


# DOD detector
dod:
  n_clusters: 10
  threshold_percentile: 95.0
  metrics:
    - {name: minkowski_l1, metric: minkowski, p: 1}
    - {name: minkowski_l2, metric: minkowski, p: 2}
    - {name: minkowski_inf, metric: minkowski, p: .inf}
    - {name: mahalanobis, metric: mahalanobis, p: 2}


# Dimensionality reduction
reductors:
  umap:
    n_neighbors: 15
    min_dist: 0.1
    n_components: 2
  pca:
    n_components: 64
  random_subspace:
    n_components: 64


# K-fold evaluation
kfold:
  n_splits: 5
