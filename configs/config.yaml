# Datasets
data:
  root: ./data/medmnist
  image_size: 224
  num_workers: 4
  primary_dataset: pathmnist
  in_dist_classes: [0, 2, 3, 4, 5]      # adipose, debris, lymphocytes, mucus, smooth muscle
  near_ood_classes: [6, 7, 8]           # normal colon mucosa, cancer-associated stroma, adenocarcinoma
  excluded_classes: [1]                 # background
  far_ood: pneumoniamnist


# Pretrained models
models:
  vit: vit_base_patch16_224
  cnn: resnet50


# Training and extraction
training:
  batch_size: 64
  epochs: 20
  lr: 1e-5
  weight_decay: 1e-4
  seed: 1410
  device: cuda


# UMAP projection
umap:
  n_neighbors: 15
  min_dist: 0.1


# OOD detectors
ood:
  kmeans_clusters: 10
  dbscan_eps: 0.5
  dbscan_min_samples: 5
